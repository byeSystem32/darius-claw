name: Deploy darius-claw to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            cd /tmp
            rm -rf darius-deploy
            git clone https://github.com/byeSystem32/darius-claw.git darius-deploy

            mkdir -p /srv/darius-claw/workspace
            rsync -av --delete /tmp/darius-deploy/workspace/ /srv/darius-claw/workspace/

            rm -rf /tmp/darius-deploy

            cd /opt/openclaw
            docker compose -p darius-claw --env-file /srv/darius-claw.env up -d
            docker compose -p darius-claw --env-file /srv/darius-claw.env ps
            docker logs --tail=50 darius-claw-openclaw-gateway-1
